<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editor de Cartões</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="bg-dark text-white text-center p-3">
    <h1>Trabalhos de Design de Interação</h1>
</header>

<nav class="bg-light p-2 text-center">
    <a href="index.html" class="mx-2">Apresentação</a>
    <a href="editor.html" class="mx-2">Trabalho 1</a>
    <a href="#" class="mx-2">Trabalho 2</a>
    <a href="#" class="mx-2">Trabalho 3</a>
</nav>

<main class="container my-4">

<div class="row">

    <div class="col-md-6">
        <h3>Editor de Cartão</h3>

        <label class="form-label">Texto</label>
        <input type="text" id="texto" class="form-control mb-2">

        <label class="form-label">Cor do fundo</label>
        <input type="color" id="bgColor" class="form-control form-control-color mb-2">

        <label class="form-label">Cor do texto</label>
        <input type="color" id="textColor" class="form-control form-control-color mb-2">

        <label class="form-label">Tamanho do texto</label>
        <input type="range" id="fontSize" min="10" max="50" class="form-range mb-2">

        <label class="form-label">URL da imagem</label>
        <input type="url" id="imagem" class="form-control mb-2" placeholder="https://...">

    </div>

    <div class="col-md-6 d-flex justify-content-center align-items-center">
        <div id="cartao">
            <p id="textoCartao">Seu texto aqui</p>
            <img id="imgCartao" style="display:none;" alt="Imagem do cartão">
        </div>
    </div>

</div>

</main>

<footer class="bg-dark text-white text-center p-3">
    <p>© 2026 - Cauã</p>
</footer>

<script src="script.js"></script>

</body>
</html>
